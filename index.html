<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>XYZ.ai — AI that actually ships.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Spline 3D viewer (web component) -->
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.48/build/spline-viewer.js"></script>

<style>
  :root {
    --bg-deep: #0a0a12;
    --bg-dark: #12121f;
    --bg-card: rgba(20, 20, 35, 0.7);
    --cyan: #00f5ff;
    --cyan-glow: rgba(0, 245, 255, 0.4);
    --magenta: #ff00aa;
    --magenta-glow: rgba(255, 0, 170, 0.4);
    --pink: #ff6b9d;
    --purple: #a855f7;
    --purple-soft: #c084fc;
    --blue: #3b82f6;
    --text: #f0f0f5;
    --text-muted: #9ca3af;
    --text-dim: #6b7280;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --gradient-hero: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    --gradient-accent: linear-gradient(135deg, var(--cyan), var(--magenta));
    --gradient-card: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(0, 245, 255, 0.05));
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: "Inter", system-ui, sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    font-size: 16px;
    line-height: 1.6;
  }

  /* Animated gradient background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(168, 85, 247, 0.3), transparent),
      radial-gradient(ellipse 60% 40% at 100% 50%, rgba(0, 245, 255, 0.15), transparent),
      radial-gradient(ellipse 60% 40% at 0% 80%, rgba(255, 0, 170, 0.15), transparent),
      var(--bg-deep);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid overlay */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  main, header, footer { position: relative; z-index: 1; }

  h1, h2, h3, h4 {
    font-family: "Sora", system-ui, sans-serif;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .mono {
    font-family: "Fira Code", monospace;
    font-weight: 500;
  }

  a { color: inherit; text-decoration: none; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  /* ---------- LAYOUT ---------- */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }
  @media (max-width: 720px) {
    .container { padding: 0 20px; }
  }

  section { padding: 120px 0; position: relative; }
  @media (max-width: 720px) {
    section { padding: 80px 0; }
  }

  /* ---------- TOPBAR ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10, 10, 18, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
  }
  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: "Sora", sans-serif;
    font-weight: 700;
    font-size: 24px;
  }
  .nav {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .nav a {
    padding: 10px 18px;
    border-radius: 12px;
    font-weight: 500;
    font-size: 14px;
    color: var(--text-muted);
    transition: all .2s ease;
  }
  .nav a:hover {
    color: var(--text);
    background: var(--glass);
  }
  @media (max-width: 920px) { .nav { display: none; } }

  /* ---------- BUTTONS ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 28px;
    border: none;
    background: var(--gradient-accent);
    color: white;
    font-family: "Sora", sans-serif;
    font-weight: 600;
    font-size: 15px;
    border-radius: 14px;
    transition: all .25s ease;
    cursor: pointer;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity .25s;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 40px -10px var(--cyan-glow), 0 10px 20px -10px var(--magenta-glow);
  }
  .btn:hover::before { opacity: 1; }

  .btn.secondary {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
  }
  .btn.secondary:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--cyan);
    box-shadow: 0 0 30px -10px var(--cyan-glow);
  }

  .btn.sm { padding: 10px 20px; font-size: 14px; border-radius: 10px; }

  /* ---------- CARDS (Glassmorphism) ---------- */
  .card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 32px;
    transition: all .3s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--gradient-card);
    opacity: 0;
    transition: opacity .3s;
  }
  .card:hover {
    border-color: rgba(168, 85, 247, 0.3);
    transform: translateY(-4px);
    box-shadow: 0 25px 50px -12px rgba(168, 85, 247, 0.15);
  }
  .card:hover::before { opacity: 1; }
  .card > * { position: relative; z-index: 1; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    background: var(--glass);
    backdrop-filter: blur(10px);
    font-family: "Fira Code", monospace;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: "Fira Code", monospace;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--cyan);
  }
  .eyebrow::before {
    content: "";
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, var(--cyan), transparent);
  }

  /* ---------- HERO ---------- */
  .hero {
    padding: 100px 0 120px;
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
  }

  .hero h1 {
    font-size: clamp(48px, 8vw, 100px);
    line-height: 1;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero h1 .highlight {
    background: var(--gradient-accent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
  }

  .hero-sub {
    font-size: clamp(17px, 1.5vw, 20px);
    max-width: 520px;
    margin-top: 28px;
    line-height: 1.7;
    color: var(--text-muted);
  }
  .hero-cta { display: flex; gap: 16px; margin-top: 40px; flex-wrap: wrap; }

  /* Floating elements */
  .float-element {
    position: absolute;
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }

  /* ---------- SAKURA PETALS ---------- */
  .sakura-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .petal {
    position: absolute;
    width: 10px;
    height: 10px;
    background: linear-gradient(135deg, #ffb7c5, #ff6b9d);
    border-radius: 150% 0 150% 0;
    opacity: 0.6;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-100px) rotate(0deg) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(100vh) rotate(720deg) translateX(100px); opacity: 0; }
  }

  /* ---------- MARQUEE ---------- */
  .marquee {
    background: rgba(0, 245, 255, 0.03);
    border-top: 1px solid var(--glass-border);
    border-bottom: 1px solid var(--glass-border);
    overflow: hidden;
    padding: 24px 0;
    position: relative;
    z-index: 1;
  }
  .marquee-track {
    display: flex;
    gap: 60px;
    animation: marquee 35s linear infinite;
    white-space: nowrap;
    width: max-content;
  }
  .marquee-track > span {
    font-family: "Sora", sans-serif;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 60px;
  }
  .marquee-track .dot {
    width: 6px;
    height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--cyan);
  }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ---------- SECTION TITLES ---------- */
  .section-title {
    font-size: clamp(36px, 5vw, 64px);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .section-title .gradient {
    background: var(--gradient-accent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .section-head {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 48px;
    align-items: end;
    margin-bottom: 64px;
  }
  @media (max-width: 900px) {
    .section-head { grid-template-columns: 1fr; gap: 24px; }
  }
  .section-lede { font-size: 17px; max-width: 42ch; color: var(--text-muted); line-height: 1.7; }

  /* ---------- GLOW ORBS ---------- */
  .glow-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .marquee-track { animation: none; }
    .petal { animation: none; }
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
  <!-- Sakura petals container -->
  <div class="sakura-container" id="sakura"></div>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---------- SAKURA PETAL GENERATOR ---------- */
function initSakura() {
  const container = document.getElementById('sakura');
  const petalCount = 25;

  for (let i = 0; i < petalCount; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.style.left = Math.random() * 100 + '%';
    petal.style.animationDuration = (Math.random() * 10 + 10) + 's';
    petal.style.animationDelay = (Math.random() * 15) + 's';
    petal.style.width = (Math.random() * 8 + 6) + 'px';
    petal.style.height = (Math.random() * 8 + 6) + 'px';
    container.appendChild(petal);
  }
}

/* ---------- TRIANGLE LOGO ---------- */
function TriangleLogo({ size = 36 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none" aria-hidden>
      <defs>
        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#00f5ff" />
          <stop offset="100%" stopColor="#ff00aa" />
        </linearGradient>
      </defs>
      <path
        d="M20 4 L36 32 L4 32 Z"
        fill="url(#logo-grad)"
        filter="drop-shadow(0 0 8px rgba(0, 245, 255, 0.5))"
      />
      <path
        d="M20 10 L30 28 L10 28 Z"
        fill="rgba(255,255,255,0.2)"
      />
    </svg>
  );
}

/* ---------- WORDMARK ---------- */
function Wordmark({ size = 24 }) {
  return (
    <span className="brand" style={{ fontSize: size }}>
      <TriangleLogo size={size * 1.4} />
      <span style={{
        background: 'linear-gradient(135deg, #fff, #a78bfa)',
        WebkitBackgroundClip: 'text',
        WebkitTextFillColor: 'transparent'
      }}>XYZ<span style={{
        background: 'linear-gradient(135deg, #00f5ff, #ff00aa)',
        WebkitBackgroundClip: 'text',
        WebkitTextFillColor: 'transparent'
      }}>.ai</span></span>
    </span>
  );
}

/* ---------- SPARKLE ---------- */
function Sparkle({ size = 24, style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={style} aria-hidden>
      <path
        d="M12 0L13.5 10.5L24 12L13.5 13.5L12 24L10.5 13.5L0 12L10.5 10.5Z"
        fill="url(#sparkle-grad)"
        filter="drop-shadow(0 0 4px rgba(0, 245, 255, 0.8))"
      />
      <defs>
        <linearGradient id="sparkle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#00f5ff" />
          <stop offset="100%" stopColor="#a855f7" />
        </linearGradient>
      </defs>
    </svg>
  );
}

/* ---------- BUTTON ---------- */
function Button({ children, variant = "primary", size = "md", as = "button", href, onClick, style }) {
  const cls = ["btn", variant, size === "sm" ? "sm" : ""].filter(Boolean).join(" ");
  if (as === "a" || href) {
    return <a className={cls} href={href} onClick={onClick} style={style}>{children}</a>;
  }
  return <button className={cls} onClick={onClick} style={style}>{children}</button>;
}

/* ---------- CARD ---------- */
function Card({ children, className = "", style, glowColor }) {
  const glowStyle = glowColor ? {
    boxShadow: `0 0 60px -20px ${glowColor}`,
  } : {};
  return (
    <div className={"card " + className} style={{ ...glowStyle, ...style }}>
      {children}
    </div>
  );
}

/* ---------- SPLINE SCENE ---------- */
function SplineScene({ scene, className, style }) {
  const ref = useRef(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const onLoad = () => setLoaded(true);
    el.addEventListener("load", onLoad);
    const t = setTimeout(() => setLoaded(true), 3500);
    return () => {
      el.removeEventListener("load", onLoad);
      clearTimeout(t);
    };
  }, []);

  return (
    <div className={className} style={{ position: "relative", width: "100%", height: "100%", ...style }}>
      {!loaded && (
        <div style={{
          position: "absolute", inset: 0, display: "flex",
          alignItems: "center", justifyContent: "center",
          background: "transparent", zIndex: 2, pointerEvents: "none"
        }}>
          <div style={{
            width: 48, height: 48,
            border: '2px solid rgba(0, 245, 255, 0.3)',
            borderTopColor: '#00f5ff',
            borderRadius: '50%',
            animation: 'spin 1s linear infinite'
          }} />
        </div>
      )}
      {React.createElement("spline-viewer", {
        ref,
        url: scene,
        "loading-anim-type": "spinner-small-dark",
        "events-target": "global",
        style: {
          width: "100%",
          height: "100%",
          background: "transparent",
          opacity: loaded ? 1 : 0,
          transition: "opacity .5s ease",
        },
      })}
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

/* ---------- TOP NAV ---------- */
function TopBar() {
  const [open, setOpen] = useState(false);
  return (
    <header className="topbar">
      <div className="topbar-inner">
        <a href="#top" style={{ display: "flex", alignItems: "center" }}>
          <Wordmark size={22} />
        </a>
        <nav className="nav">
          <a href="#what">Services</a>
          <a href="#about">About</a>
          <a href="#projects">Work</a>
          <a href="#contact">Contact</a>
          <Button href="#contact" size="sm" style={{ marginLeft: 12 }}>
            Start Project
          </Button>
        </nav>
        <button
          onClick={() => setOpen(!open)}
          style={{
            display: "none",
            padding: "10px 16px",
            background: "rgba(255,255,255,0.05)",
            border: "1px solid rgba(255,255,255,0.1)",
            borderRadius: 10,
            color: "#fff",
            fontFamily: "Fira Code",
            fontSize: 12,
          }}
          className="mobile-toggle"
          aria-label="Menu"
        >
          {open ? "CLOSE" : "MENU"}
        </button>
      </div>
      {open && (
        <div style={{
          borderTop: "1px solid rgba(255,255,255,0.1)",
          padding: "20px",
          background: "rgba(10, 10, 18, 0.95)",
          backdropFilter: "blur(20px)",
          display: "flex",
          flexDirection: "column",
          gap: 8,
        }}>
          {[["Services", "#what"], ["About", "#about"], ["Work", "#projects"], ["Contact", "#contact"]].map(([l, h]) => (
            <a key={h} href={h} onClick={() => setOpen(false)} style={{
              padding: "14px 20px",
              borderRadius: 12,
              background: "rgba(255,255,255,0.05)",
              color: "#f0f0f5",
              fontWeight: 500
            }}>{l}</a>
          ))}
        </div>
      )}
      <style>{`
        @media (max-width: 920px) {
          .mobile-toggle { display: inline-flex !important; }
        }
      `}</style>
    </header>
  );
}

/* ---------- HERO ---------- */
function Hero() {
  useEffect(() => {
    initSakura();
  }, []);

  return (
    <section className="hero" id="top">
      {/* Glow orbs */}
      <div className="glow-orb" style={{ width: 500, height: 500, background: 'rgba(168, 85, 247, 0.15)', top: -100, right: -100 }} />
      <div className="glow-orb" style={{ width: 400, height: 400, background: 'rgba(0, 245, 255, 0.1)', bottom: 0, left: -100 }} />

      {/* Floating sparkles */}
      <div className="float-element" style={{ top: '15%', right: '15%', animationDelay: '0s' }}>
        <Sparkle size={32} />
      </div>
      <div className="float-element" style={{ top: '60%', left: '8%', animationDelay: '2s' }}>
        <Sparkle size={24} />
      </div>
      <div className="float-element" style={{ bottom: '20%', right: '25%', animationDelay: '4s' }}>
        <Sparkle size={20} />
      </div>

      <div className="container" style={{ width: '100%' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'center' }}>
          <div>
            <span className="eyebrow">AI Engineering Studio</span>
            <h1 style={{ marginTop: 24 }}>
              Ship AI that<br/>
              <span className="highlight">actually works.</span>
            </h1>
            <p className="hero-sub">
              We're a focused team of AI engineers and designers building intelligent features that drive real results — not just impressive demos.
            </p>
            <div className="hero-cta">
              <Button href="#contact">
                Start a Project <span style={{ marginLeft: 4 }}>→</span>
              </Button>
              <Button href="#projects" variant="secondary">
                View Our Work
              </Button>
            </div>
            <div style={{ marginTop: 48, display: "flex", gap: 32, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ display: "flex", alignItems: 'center' }}>
                {["#a855f7", "#00f5ff", "#ff00aa", "#3b82f6"].map((c, i) => (
                  <div key={i} style={{
                    width: 42, height: 42, borderRadius: "50%",
                    border: "2px solid rgba(255,255,255,0.2)",
                    background: `linear-gradient(135deg, ${c}, ${c}88)`,
                    marginLeft: i === 0 ? 0 : -12,
                    boxShadow: `0 0 20px ${c}44`
                  }} />
                ))}
              </div>
              <div style={{ fontSize: 14, lineHeight: 1.5, color: 'var(--text-muted)' }}>
                <strong style={{ color: '#fff' }}>22 teams</strong> shipping AI with us
              </div>
            </div>
          </div>

          <div style={{ position: 'relative' }}>
            <div style={{
              position: 'relative',
              aspectRatio: '1',
              background: 'linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(0, 245, 255, 0.1))',
              border: '1px solid rgba(255,255,255,0.1)',
              borderRadius: 32,
              overflow: 'hidden',
              boxShadow: '0 0 80px -20px rgba(168, 85, 247, 0.4), inset 0 0 60px rgba(0, 245, 255, 0.05)'
            }}>
              <SplineScene
                scene="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode"
                style={{ width: "100%", height: "100%" }}
              />
              <div style={{
                position: 'absolute',
                bottom: 20, left: 20,
                background: 'rgba(10, 10, 18, 0.8)',
                backdropFilter: 'blur(10px)',
                border: '1px solid rgba(255,255,255,0.1)',
                borderRadius: 14,
