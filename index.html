<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>XYZ.ai — AI that actually ships.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Spline 3D viewer (web component) -->
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.48/build/spline-viewer.js"></script>

<style>
  :root {
    --yellow: #FFE500;
    --yellow-deep: #FFD60A;
    --cream: #FFF6CC;
    --ink: #0A0A0A;
    --ink-soft: #1A1A1A;
    --paper: #FAF6E9;
    --pink: #FF3D8B;
    --blue: #2E5BFF;
    --green: #00C853;
    --orange: #FF6B2C;
    --lilac: #B9A6FF;
    --shadow: 6px 6px 0 0 var(--ink);
    --shadow-lg: 10px 10px 0 0 var(--ink);
    --shadow-sm: 3px 3px 0 0 var(--ink);
    --border: 3px solid var(--ink);
    --border-thick: 4px solid var(--ink);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: "Inter Tight", system-ui, sans-serif;
    background: var(--yellow);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    font-size: 17px;
    line-height: 1.5;
  }

  /* Background grid pattern across the page */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(10,10,10,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  main, header, footer { position: relative; z-index: 1; }

  h1, h2, h3, h4 {
    font-family: "Bricolage Grotesque", system-ui, sans-serif;
    font-weight: 700;
    line-height: 0.92;
    letter-spacing: -0.025em;
  }

  .mono {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  a { color: inherit; text-decoration: none; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  /* ---------- LAYOUT ---------- */
  .container {
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 32px;
  }
  @media (max-width: 720px) {
    .container { padding: 0 20px; }
  }

  section { padding: 120px 0; position: relative; }
  @media (max-width: 720px) {
    section { padding: 72px 0; }
  }

  /* ---------- TOPBAR ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--yellow);
    border-bottom: var(--border-thick);
  }
  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 76px;
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 32px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.02em;
  }
  .nav {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .nav a {
    padding: 10px 16px;
    border-radius: 999px;
    font-weight: 500;
    font-size: 15px;
    transition: background .15s, transform .15s;
  }
  .nav a:hover {
    background: var(--ink);
    color: var(--yellow);
    transform: translateY(-1px);
  }
  @media (max-width: 920px) { .nav { display: none; } }

  /* ---------- BUTTONS ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 22px;
    border: var(--border);
    background: var(--ink);
    color: var(--yellow);
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.01em;
    border-radius: 999px;
    box-shadow: var(--shadow);
    transition: transform .12s ease, box-shadow .12s ease;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 0 var(--ink); }
  .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 0 var(--ink); }

  .btn.secondary { background: var(--paper); color: var(--ink); }
  .btn.pink { background: var(--pink); color: white; }
  .btn.blue { background: var(--blue); color: white; }
  .btn.sm { padding: 10px 16px; font-size: 14px; box-shadow: var(--shadow-sm); }
  .btn.sm:hover { box-shadow: 5px 5px 0 0 var(--ink); }

  /* ---------- CARDS ---------- */
  .card {
    background: var(--paper);
    border: var(--border-thick);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 28px;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .card:hover { transform: translate(-3px, -3px); box-shadow: var(--shadow-lg); }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    background: var(--paper);
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .eyebrow::before {
    content: "";
    width: 24px;
    height: 2px;
    background: var(--ink);
  }

  /* ---------- HERO ---------- */
  .hero { padding: 80px 0 100px; position: relative; }

  .hero h1 {
    font-size: clamp(56px, 10vw, 160px);
    line-height: 0.86;
    letter-spacing: -0.04em;
  }
  .hero h1 .stroke { -webkit-text-stroke: 3px var(--ink); color: transparent; }
  .hero h1 em {
    font-style: normal;
    background: var(--ink);
    color: var(--yellow);
    padding: 0 0.1em;
    display: inline-block;
    transform: rotate(-1.5deg);
  }

  .hero-sub {
    font-size: clamp(18px, 1.6vw, 22px);
    max-width: 580px;
    margin-top: 32px;
    line-height: 1.45;
  }
  .hero-cta { display: flex; gap: 16px; margin-top: 40px; flex-wrap: wrap; }

  .sticker {
    position: absolute;
    border: var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    background: white;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    box-shadow: var(--shadow-sm);
  }

  /* ---------- MARQUEE ---------- */
  .marquee {
    border-top: var(--border-thick);
    border-bottom: var(--border-thick);
    background: var(--ink);
    color: var(--yellow);
    overflow: hidden;
    padding: 22px 0;
    position: relative;
    z-index: 1;
  }
  .marquee-track {
    display: flex;
    gap: 56px;
    animation: marquee 38s linear infinite;
    white-space: nowrap;
    width: max-content;
  }
  .marquee-track > span {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -0.02em;
    display: inline-flex;
    align-items: center;
    gap: 56px;
  }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ---------- SECTION TITLES ---------- */
  .section-title {
    font-size: clamp(44px, 6vw, 88px);
    line-height: 0.94;
    letter-spacing: -0.035em;
    max-width: 14ch;
  }
  .section-head {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 64px;
    align-items: end;
    margin-bottom: 64px;
  }
  @media (max-width: 900px) {
    .section-head { grid-template-columns: 1fr; gap: 24px; align-items: start; }
  }
  .section-lede { font-size: 19px; max-width: 38ch; }

  /* ---------- BG VARIANTS ---------- */
  .bg-cream { background: var(--cream); border-top: var(--border-thick); border-bottom: var(--border-thick); }
  .bg-paper { background: var(--paper); border-top: var(--border-thick); border-bottom: var(--border-thick); }
  .bg-ink { background: var(--ink); color: var(--yellow); border-top: var(--border-thick); border-bottom: var(--border-thick); }
  .bg-pink { background: var(--pink); color: white; border-top: var(--border-thick); border-bottom: var(--border-thick); }

  /* ---------- UTIL ---------- */
  .rotate-l { transform: rotate(-2deg); }
  .rotate-r { transform: rotate(2deg); }
  .rotate-l-3 { transform: rotate(-3deg); }
  .rotate-r-3 { transform: rotate(3deg); }

  /* ---------- LOADER ---------- */
  .loader {
    width: 44px; height: 44px;
    border: 4px solid #0A0A0A;
    border-right-color: transparent;
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Hide the spline default attribution if shown by viewer */
  spline-viewer::part(logo) { display: none !important; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .marquee-track { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---------- TRIANGLE LOGO ---------- */
function TriangleLogo({ size = 36, fill = "#0A0A0A", accent = "#FFE500", withFace = true }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none" aria-hidden>
      <path
        d="M20 4 L36 32 L4 32 Z"
        fill={fill}
        stroke={fill}
        strokeWidth="3"
        strokeLinejoin="round"
      />
      {withFace && (
        <>
          <circle cx="15" cy="22" r="1.6" fill={accent} />
          <circle cx="25" cy="22" r="1.6" fill={accent} />
          <path d="M15 27 Q20 30 25 27" stroke={accent} strokeWidth="1.6" strokeLinecap="round" fill="none" />
        </>
      )}
    </svg>
  );
}

/* ---------- WORDMARK ---------- */
function Wordmark({ size = 26 }) {
  return (
    <span className="brand" style={{ fontSize: size }}>
      <TriangleLogo size={size * 1.1} />
      <span>XYZ<span style={{ color: "#FF3D8B" }}>.ai</span></span>
    </span>
  );
}

/* ---------- SPARKLE / STAR ---------- */
function Sparkle({ size = 28, color = "#0A0A0A", style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" style={style} aria-hidden>
      <path
        d="M16 2 L18.5 13.5 L30 16 L18.5 18.5 L16 30 L13.5 18.5 L2 16 L13.5 13.5 Z"
        fill={color}
      />
    </svg>
  );
}

/* ---------- BURST ---------- */
function Burst({ size = 80, color = "#FF3D8B" }) {
  const points = [];
  const cx = 50, cy = 50;
  const N = 16;
  for (let i = 0; i < N * 2; i++) {
    const r = i % 2 === 0 ? 48 : 30;
    const a = (i / (N * 2)) * Math.PI * 2 - Math.PI / 2;
    points.push(`${cx + Math.cos(a) * r},${cy + Math.sin(a) * r}`);
  }
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" aria-hidden>
      <polygon points={points.join(" ")} fill={color} stroke="#0A0A0A" strokeWidth="3" strokeLinejoin="round" />
    </svg>
  );
}

/* ---------- SQUIGGLE ---------- */
function Squiggle({ width = 200, color = "#0A0A0A", style }) {
  return (
    <svg width={width} height="20" viewBox="0 0 200 20" style={style} aria-hidden preserveAspectRatio="none">
      <path d="M0 10 Q 12.5 0, 25 10 T 50 10 T 75 10 T 100 10 T 125 10 T 150 10 T 175 10 T 200 10"
        stroke={color} strokeWidth="3" fill="none" strokeLinecap="round" />
    </svg>
  );
}

/* ---------- BUTTON ---------- */
function Button({ children, variant = "primary", size = "md", as = "button", href, onClick, style }) {
  const cls = ["btn", variant, size === "sm" ? "sm" : ""].filter(Boolean).join(" ");
  if (as === "a" || href) {
    return <a className={cls} href={href} onClick={onClick} style={style}>{children}</a>;
  }
  return <button className={cls} onClick={onClick} style={style}>{children}</button>;
}

/* ---------- CARD ---------- */
function Card({ children, className = "", style, color = "paper", rotate = 0 }) {
  const bg = {
    paper: "#FAF6E9",
    cream: "#FFF6CC",
    white: "#FFFFFF",
    pink: "#FF3D8B",
    blue: "#2E5BFF",
    green: "#00C853",
    orange: "#FF6B2C",
    lilac: "#B9A6FF",
    ink: "#0A0A0A",
    yellow: "#FFE500",
  }[color] || color;
  const isDark = color === "ink" || color === "blue" || color === "pink";
  return (
    <div
      className={"card " + className}
      style={{
        background: bg,
        color: isDark ? "#FAF6E9" : "#0A0A0A",
        transform: rotate ? `rotate(${rotate}deg)` : undefined,
        ...style
      }}
    >
      {children}
    </div>
  );
}

/* ---------- SPLINE SCENE ---------- */
function SplineScene({ scene, className, style }) {
  const ref = useRef(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const onLoad = () => setLoaded(true);
    el.addEventListener("load", onLoad);
    const t = setTimeout(() => setLoaded(true), 3500);
    return () => {
      el.removeEventListener("load", onLoad);
      clearTimeout(t);
    };
  }, []);

  return (
    <div className={className} style={{ position: "relative", width: "100%", height: "100%", ...style }}>
      {!loaded && (
        <div style={{
          position: "absolute", inset: 0, display: "flex",
          alignItems: "center", justifyContent: "center",
          background: "transparent", zIndex: 2, pointerEvents: "none"
        }}>
          <div className="loader" />
        </div>
      )}
      {React.createElement("spline-viewer", {
        ref,
        url: scene,
        "loading-anim-type": "spinner-small-dark",
        "events-target": "global",
        style: {
          width: "100%",
          height: "100%",
          background: "transparent",
          opacity: loaded ? 1 : 0,
          transition: "opacity .4s ease",
        },
      })}
    </div>
  );
}

/* ---------- TOP NAV ---------- */
function TopBar() {
  const [open, setOpen] = useState(false);
  return (
    <header className="topbar">
      <div className="topbar-inner">
        <a href="#top" className="brand-link" style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <Wordmark size={24} />
        </a>
        <nav className="nav">
          <a href="#what">What we do</a>
          <a href="#about">About</a>
          <a href="#projects">Projects</a>
          <a href="#contact">Contact</a>
          <Button href="#contact" size="sm" style={{ marginLeft: 8 }}>
            Start a project →
          </Button>
        </nav>
        <button
          className="mobile-toggle"
          onClick={() => setOpen(!open)}
          style={{
            display: "none",
            border: "3px solid #0A0A0A",
            borderRadius: 12,
            padding: "8px 12px",
            background: "#FAF6E9",
            fontWeight: 600,
            fontFamily: "JetBrains Mono",
            fontSize: 13,
          }}
          aria-label="Menu"
        >
          {open ? "✕" : "☰"} MENU
        </button>
      </div>
      {open && (
        <div style={{
          borderTop: "3px solid #0A0A0A",
          padding: "16px 20px",
          background: "#FFE500",
          display: "flex",
          flexDirection: "column",
          gap: 10,
        }}>
          {[["What we do", "#what"], ["About", "#about"], ["Projects", "#projects"], ["Contact", "#contact"]].map(([l, h]) => (
            <a key={h} href={h} onClick={() => setOpen(false)} style={{ padding: "10px 12px", border: "2px solid #0A0A0A", borderRadius: 12, background: "#FAF6E9", fontWeight: 600 }}>{l}</a>
          ))}
        </div>
      )}
      <style>{`
        @media (max-width: 920px) {
          .mobile-toggle { display: inline-flex !important; }
        }
      `}</style>
    </header>
  );
}

/* ---------- HERO ---------- */
function Hero() {
  return (
    <section className="hero" id="top">
      {/* Decorative stickers */}
      <div className="sticker rotate-l" style={{ top: 32, right: "8%", background: "#FF3D8B", color: "white" }}>
        ★ NO BS, NO HYPE
      </div>
      <div className="sticker rotate-r" style={{ top: 240, right: "3%", background: "#2E5BFF", color: "white" }}>
        SHIPPING SINCE 2024
      </div>
      <div className="sticker rotate-l-3" style={{ bottom: 80, left: "4%", background: "#00C853", color: "#0A0A0A" }}>
        ✦ HUMAN-WRITTEN
      </div>

      <div style={{ position: "absolute", top: 100, left: "5%", opacity: 0.9 }}>
        <Sparkle size={36} color="#FF3D8B" />
      </div>
      <div style={{ position: "absolute", bottom: 120, right: "30%" }}>
        <Sparkle size={22} color="#2E5BFF" />
      </div>

      <div className="container">
        <div className="hero-grid">
          <div className="hero-text">
            <span className="eyebrow">XYZ.AI &nbsp;/&nbsp; AN AI ENGINEERING STUDIO</span>
            <h1 style={{ marginTop: 24 }}>
              Ship AI<br/>
              that <em>actually</em><br/>
              <span className="stroke">works.</span>
            </h1>
            <p className="hero-sub">
              We're a tiny team of AI engineers and product designers building the AI features that move your numbers — not the ones that look good in a deck.
            </p>
            <div className="hero-cta">
              <Button href="#contact" variant="primary">
                Start a project →
              </Button>
              <Button href="#projects" variant="secondary">
                See our work
              </Button>
            </div>
            <div style={{ marginTop: 36, display: "flex", gap: 24, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ display: "flex" }}>
                {["#FF3D8B", "#2E5BFF", "#00C853", "#FF6B2C"].map((c, i) => (
                  <div key={i} style={{
                    width: 38, height: 38, borderRadius: "50%",
                    border: "3px solid #0A0A0A", background: c,

                  }} />
                ))}

              <div style={{ fontSize: 14, lineHeight: 1.4, maxWidth: 240 }}>

            </div>
          </div>

          <div className="hero-robot">
            <div className="robot-frame">

              <div className="robot-tag">

              </div>
              <div className="robot-badge">
                <Burst size={86} color="#FFE500" />
                <span style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", textAlign: "center", lineHeight: 1, fontFamily: "Bricolage Grotesque", fontWeight: 800, fontSize: 14, color: "#0A0A0A", transform: "rotate(-8deg)" }}>
                  LIVE<br/>3D
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <style>{`
        .hero-grid {
          display: grid;
          grid-template-columns: 1.05fr 1fr;
          gap: 48px;
          align-items: center;
        }
        .hero-robot { position: relative; }
        .robot-frame {
          position: relative;
          aspect-ratio: 1 / 1.05;
          background: #0A0A0A;
          border: 4px solid #0A0A0A;
          border-radius: 28px;
          box-shadow: 12px 12px 0 0 #FF3D8B, 12px 12px 0 4px #0A0A0A;
          overflow: hidden;
          background-image:
            radial-gradient(circle at 30% 20%, rgba(255,61,139,.18), transparent 50%),
            radial-gradient(circle at 80% 90%, rgba(46,91,255,.22), transparent 55%),
            linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
        }
        .robot-tag {
          position: absolute;
          left: 16px; bottom: 16px;
          background: #FFE500;
          border: 3px solid #0A0A0A;
          border-radius: 14px;
          padding: 8px 12px;
          display: flex; flex-direction: column; gap: 2px;
          color: #0A0A0A;
          box-shadow: 4px 4px 0 0 #0A0A0A;
          transform: rotate(-3deg);
        }
        .robot-badge {
          position: absolute;
          top: -22px; right: -22px;
          width: 86px; height: 86px;
          transform: rotate(12deg);
        }
        @media (max-width: 980px) {
          .hero-grid { grid-template-columns: 1fr; }
          .robot-frame { aspect-ratio: 1 / 1; max-width: 520px; margin: 0 auto; }
        }

}

/* ---------- MARQUEE ---------- */
function Marquee() {
  const items = ["BUILDING WITH GPT-5", "RAG SYSTEMS", "VOICE AGENTS", "FINE-TUNING", "EVALS", "AGENTIC WORKFLOWS", "MCP SERVERS", "VECTOR SEARCH", "FAST SHIPPING"];
  const row = (
    <span>
      {items.map((it, i) => (
        <React.Fragment key={i}>
          {it}
          <Sparkle size={20} color="#FFE500" style={{ display: "inline-block", verticalAlign: "middle" }} />
        </React.Fragment>
      ))}
    </span>
  );
  return (
    <div className="marquee">
      <div className="marquee-track">
        {row}{row}
      </div>
    </div>
  );
}

/* ---------- WHAT WE DO ---------- */

              <span className="pill" style={{ background: "#FF3D8B", color: "white", borderColor: "#FAF6E9" }}>✦ NDA-friendly</span>
              <span className="pill" style={{ background: "#00C853" }}>● Booking Q3</span>
            </div>
          </div>

          <form
            className="contact-form"
            onSubmit={(e) => { e.preventDefault(); setSent(true); }}
          >
            {sent ? (
              <div style={{ padding: 48, textAlign: "center" }}>
                <div style={{ fontSize: 64 }}>✦</div>
                <h3 style={{ fontSize: 36, marginTop: 12 }}>Got it!</h3>
                <p style={{ marginTop: 12, fontSize: 17 }}>
                  We'll reply to <strong>{form.email || "you"}</strong> within 48 hours.<br/>
                  In the meantime, go log off.
                </p>
                <Button onClick={() => { setSent(false); setForm({ name: "", email: "", company: "", project: "ai-strategy", budget: "25-50k", message: "" }); }} style={{ marginTop: 24 }}>
                  Send another →
                </Button>
              </div>
            ) : (
              <>
                <div className="form-row">
                  <label>
                    <span>Your name</span>
                    <input required value={form.name} onChange={upd("name")} placeholder="Sam Builder" />
                  </label>
                  <label>
                    <span>Email</span>
                    <input required type="email" value={form.email} onChange={upd("email")} placeholder="sam@company.com" />
                  </label>
                </div>
                <label>
                  <span>Company</span>
                  <input value={form.company} onChange={upd("company")} placeholder="Acme Inc." />
                </label>
                <div className="form-row">
                  <label>
                    <span>What do you need?</span>
                    <select value={form.project} onChange={upd("project")}>
                      <option value="ai-strategy">AI Strategy & Roadmap</option>
                      <option value="custom-models">Custom Models / Fine-tuning</option>
                      <option value="agents">AI Agents & Automations</option>
                      <option value="rag">RAG / Knowledge Systems</option>
                      <option value="design">AI Product Design</option>
                      <option value="infra">ML Infra & Evals</option>
                      <option value="other">Something else</option>
                    </select>
                  </label>
                  <label>
                    <span>Budget</span>
                    <select value={form.budget} onChange={upd("budget")}>
                      <option value="under-25k">&lt; $25k</option>
                      <option value="25-50k">$25k–$50k</option>
                      <option value="50-150k">$50k–$150k</option>
                      <option value="150k+">$150k+</option>
                      <option value="unsure">Not sure yet</option>
                    </select>
                  </label>
                </div>
                <label>
                  <span>Tell us what you're building</span>
                  <textarea rows="5" value={form.message} onChange={upd("message")} placeholder="A paragraph or two — links and Looms welcome." />
                </label>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8, gap: 16, flexWrap: "wrap" }}>
                  <span className="mono" style={{ fontSize: 12, color: "#0A0A0A" }}>Or just email <strong>hi@xyz.ai</strong></span>
                  <Button as="button">
                    Send it →
                  </Button>
                </div>
              </>
            )}
          </form>
        </div>
      </div>

      <style>{`
        .contact-grid {
          display: grid;
          grid-template-columns: 1fr 1.1fr;
          gap: 64px;
          align-items: start;
        }
        .contact-form {
          background: #FFE500;
          border: 4px solid #0A0A0A;
          border-radius: 28px;
          box-shadow: 12px 12px 0 0 #FF3D8B, 12px 12px 0 4px #0A0A0A;
          padding: 32px;
          display: flex; flex-direction: column; gap: 14px;
          color: #0A0A0A;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .contact-form label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; font-weight: 600; }
        .contact-form span { font-family: "JetBrains Mono", monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
        .contact-form input, .contact-form select, .contact-form textarea {
          font-family: "Inter Tight", sans-serif;
          font-size: 16px;
          padding: 14px 16px;
          border: 3px solid #0A0A0A;
          border-radius: 12px;
          background: #FAF6E9;
          color: #0A0A0A;
          font-weight: 500;
        }
        .contact-form input:focus, .contact-form select:focus, .contact-form textarea:focus {
          outline: none;
          box-shadow: 4px 4px 0 0 #0A0A0A;
          transform: translate(-1px, -1px);
        }
        .contact-form textarea { resize: vertical; min-height: 120px; }
        @media (max-width: 980px) {
          .contact-grid { grid-template-columns: 1fr; gap: 40px; }
          .form-row { grid-template-columns: 1fr; }
        }
      `}</style>
    </section>
  );
}

/* ---------- FOOTER COLUMN ---------- */

  return (
    <div>
      <div className="mono" style={{ fontSize: 12, textTransform: "uppercase", marginBottom: 14, opacity: 0.7 }}>{title}</div>
      <ul style={{ listStyle: "none", display: "flex", flexDirection: "column", gap: 8 }}>
        {items.map(([l, h]) => (
          <li key={l}><a href={h} style={{ fontSize: 16, fontWeight: 500, borderBottom: "2px solid transparent" }} onMouseEnter={(e) => e.currentTarget.style.borderBottomColor = "#0A0A0A"} onMouseLeave={(e) => e.currentTarget.style.borderBottomColor = "transparent"}>{l}</a></li>
        ))}
      </ul>
    </div>
  );
}

          <FooterCol title="Elsewhere" items={[["X / Twitter", "#"], ["GitHub", "#"], ["LinkedIn", "#"], ["Read.cv", "#"]]} />

          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span className="mono" style={{ fontSize: 12 }}>STATUS</span>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 600 }}>

              All systems shipping

      <style>{`
